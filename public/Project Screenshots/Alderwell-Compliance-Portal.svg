  <text x="1091" y="742" fill="#55696f" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Status</text>
  <text x="1306" y="742" fill="#55696f" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Actions</text>

  <defs>
    <linearGradient id="barGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66be8d"/>
